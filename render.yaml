services:
  - type: web
    name: talentcore-portal
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: talentcore-db
          property: connectionString
      - key: NEXTAUTH_URL
        fromService:
          type: web
          name: talentcore-portal
          property: host
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true

databases:
  - name: talentcore-db
    databaseName: talentcore
    user: talentcore
    plan: starter